{{define "teacher_disciplines_part_group"}}
<div class="groups-list" id="disciplines-container-group">
    <h2 style="margin-left: -25px; margin-top: -90px; margin-bottom: 50px; color: rgba(255, 255, 255, 0.863);">Дисциплины</h2>

    <div class="top-nav">
        <button class="back-btn" 
                hx-post="/teacher/disciplines/" 
                hx-target="#disciplines-container-group" 
                hx-trigger="click"
                hx-swap="innerHTML">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M19 12H5M12 19l-7-7 7-7" />
            </svg>
            Назад к дисциплинам
        </button>
    </div>

    <h2 style="margin-top: 50px;">Группы по дисциплине</h2>
    
    {{if .GroupDisciplines}}
        {{range .GroupDisciplines}}
        <div class="group-item" data-group-id="{{.ID}}">
            <strong>{{.Group.GroupSign}}</strong>
            <span class="group-info">
                
            </span>
            
            <button class="group-detail-btn"
                    hx-post="/teacher/disciplines_part_table/"
                    hx-target="#disciplines-container-group"
                    hx-trigger="click"
                    hx-vals='js:{"id_group": "{{.GroupID}}", "id_discipline": "{{.DisciplineID}}"}'>
                Подробнее
            </button>
            
        </div>
        {{end}}
    {{else}}
        <p class="no-groups">Нет групп для этой дисциплины</p>
    {{end}}
</div>

<style>
    .top-nav {
        background: #014770d0;
        color: #fff;
        padding: 16px 24px;
        display: flex;
        align-items: center;
        gap: 20px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        border-radius: 8px;
    }
    .back-btn {
        background: rgba(255,255,255,0.1);
        border: none;
        color: #fff;
        padding: 8px 16px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 14px;
        display: flex;
        align-items: center;
        gap: 6px;
        transition: background 0.2s;
    }
    .back-btn:hover { background: rgba(255,255,255,0.2); }
    .top-nav h1 { font-size: 20px; font-weight: 600; letter-spacing: 0.3px; }

    .container { margin: 0 auto; padding: 20px; }

    .groups-list h2 {
        margin: 0 0 10px 0;
    }
    .group-item {
        padding: 10px;
        margin: 8px 0;
        background: white;
        border-radius: 4px;
        border-left: 3px solid #014770d0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 10px;
    }
    .group-info {
        color: #666;
        font-size: 14px;
    }
    .group-detail-btn {
        background: #014770d0;
        color: white;
        border: none;
        padding: 5px 5px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 12px;
    }
    .no-groups {
        color: #999;
        font-style: italic;
        padding: 10px;
    }
    .group-detail {
        width: 100%;
        margin-top: 10px;
    }
</style>
{{end}}
