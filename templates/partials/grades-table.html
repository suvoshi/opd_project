{{ define "grades-table.html" }}
<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Ученик</th>
            <th>Предмет</th>
            <th>Оценка</th>
        </tr>
    </thead>
    <tbody>
        {{ range . }}
        <tr>
            <td>{{ .StudentID }}</td>
            <td>{{ .Student.Name }}</td>
            <td>{{ .Subject }}</td>
            <td>{{ .Value }}</td>
        </tr>
        {{ end }}
    </tbody>
</table>
{{ end }}
