<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="login.css">
    <title>Вход</title>
    <link rel="shortcut icon" href="images/logo_1.jpg" type="image/x-icon">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>

<body>
    <header class="head">
        <img src="Images/small_logo_get_full_1_1_53a833098a.webp" alt="">
    </header>

    <div class="auth-wrapper">
        <div class="auth-card">

            <h1 class="auth-title">Вход</h1>

            <!-- Форма отправляет данные на /try_login через HTMX -->
            <!-- без перезагрузки страницы                        -->
            <form hx-post="/try_login" hx-target="#error-message" hx-trigger="submit">

                <div class="auth-fields">
                    <!-- name="login" — под этим именем логин придёт на сервер -->
                    <input class="auth-input" type="email" name="login" placeholder="Email" required>

                    <!-- name="password" — под этим именем пароль придёт на сервер -->
                    <input class="auth-input" type="password" name="password" placeholder="Пароль" required>
                </div>

                <div class="auth-buttons">
                    <!-- type="submit" — запускает отправку формы -->
                    <button class="btn btn-primary" type="submit">Войти</button>
                </div>

            </form>

            <!-- Сюда HTMX вставит сообщение об ошибке от сервера -->
            <div id="error-message" class="error"></div>

        </div>
    </div>

</body>

</html>
